{% extends "layout.html" %}
{% block title %}Edit Anggota{% endblock %}
{% block content %}
<div class="page-header animate-in" style="--delay: 1">
    <h1>Edit Anggota</h1>
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb breadcrumb-custom">
            <li class="breadcrumb-item"><a href="{{ url_for('dashboard') }}">Dashboard</a></li>
            <li class="breadcrumb-item"><a href="{{ url_for('anggota_list') }}">Anggota</a></li>
            <li class="breadcrumb-item active" aria-current="page">Edit</li>
        </ol>
    </nav>
</div>

<div class="card animate-in" style="--delay: 2">
    <div class="card-header-custom">
        <h5 class="m-0 font-weight-bold text-primary">Edit Data Anggota: {{ anggota.nama }}</h5>
    </div>
    <div class="card-body">
        <form action="{{ url_for('edit_anggota', id=anggota.id_anggota) }}" method="POST">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="nim" class="form-label font-weight-bold">NIM</label>
                    <input type="text" class="form-control" id="nim" name="nim" required value="{{ anggota.nim }}">
                </div>
                <div class="col-md-6 mb-3">
                    <label for="nama" class="form-label font-weight-bold">Nama Lengkap</label>
                    <input type="text" class="form-control" id="nama" name="nama" required value="{{ anggota.nama }}">
                </div>
                <div class="col-md-6 mb-3">
                    <label for="jabatan" class="form-label font-weight-bold">Jabatan</label>
                    <input type="text" class="form-control" id="jabatan" name="jabatan" required value="{{ anggota.jabatan }}" placeholder="Contoh: Koordinator Divisi / Staff">
                </div>
                <div class="col-md-6 mb-3">
                    <label for="divisi" class="form-label font-weight-bold">Divisi</label>
                    <select class="form-select" id="divisi" name="divisi" required>
                        <option value="">-- Pilih Divisi --</option>
                        {% for d in ['Ketua Umum','Wakil Ketua Umum','Sekretaris','Bendahara','Kaderisasi',"Syi'ar Umat",'Kemuslimahan','Entrepreneur','Humas dan Media','PSDM','Pengurus'] %}
                        <option value="{{ d }}" {% if anggota.divisi == d %}selected{% endif %}>{{ d }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="angkatan" class="form-label font-weight-bold">Angkatan</label>
                    <input type="text" class="form-control" id="angkatan" name="angkatan" value="{{ anggota.angkatan }}">
                </div>
                <div class="col-md-6 mb-3">
                    <label for="no_wa" class="form-label font-weight-bold">No. WhatsApp</label>
                    <input type="text" class="form-control" id="no_wa" name="no_wa" value="{{ anggota.no_wa }}">
                </div>
                <div class="col-md-6 mb-3">
                    <label for="status_keanggotaan" class="form-label font-weight-bold">Status Keanggotaan</label>
                    <select class="form-select" id="status_keanggotaan" name="status_keanggotaan">
                        <option value="Aktif" {% if anggota.status_keanggotaan == 'Aktif' %}selected{% endif %}>Aktif</option>
                        <option value="Cuti" {% if anggota.status_keanggotaan == 'Cuti' %}selected{% endif %}>Cuti</option>
                        <option value="Alumni" {% if anggota.status_keanggotaan == 'Alumni' %}selected{% endif %}>Alumni</option>
                        <option value="Diberhentikan" {% if anggota.status_keanggotaan == 'Diberhentikan' %}selected{% endif %}>Diberhentikan</option>
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="tipe_anggota" class="form-label font-weight-bold">Tipe Anggota</label>
                    <select class="form-select" id="tipe_anggota" name="tipe_anggota" required>
                        <option value="Anggota" {% if anggota.tipe_anggota == 'Anggota' %}selected{% endif %}>Anggota</option>
                        <option value="Pengurus" {% if anggota.tipe_anggota == 'Pengurus' %}selected{% endif %}>Pengurus</option>
                        <option value="Calon Anggota" {% if anggota.tipe_anggota == 'Calon Anggota' %}selected{% endif %}>Calon Anggota</option>
                        <option value="Anak Magang" {% if anggota.tipe_anggota == 'Anak Magang' %}selected{% endif %}>Anak Magang</option>
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="id_atasan" class="form-label font-weight-bold">Atasan / Mentor (Opsional)</label>
                    <select class="form-select" id="id_atasan" name="id_atasan">
                        <option value="">-- Pilih Atasan --</option>
                        {% for a in atasan_list %}
                        <option value="{{ a.id_anggota }}" {% if anggota.id_atasan == a.id_anggota %}selected{% endif %}>{{ a.nama }} - {{ a.jabatan }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            
            <hr class="mb-4">
            
            <div class="d-flex justify-content-end gap-2">
                <a href="{{ url_for('anggota_list') }}" class="btn btn-outline-primary"><i class="fas fa-arrow-left me-1"></i> Batal</a>
                <button type="submit" class="btn btn-accent"><i class="fas fa-save me-1"></i> Simpan Perubahan</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
